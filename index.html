<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="SysInventarios — Sistema de gestión de inventarios de equipos electrónicos universitarios con análisis por IA.">
  <title>SysInventarios — Acceso</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/index.css">
</head>

<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-card fade-in">
    <div class="auth-logo">
      <div class="auth-logo-icon">🖥️</div>
      <h1 class="gradient-text">SysInventarios</h1>
      <p>Gestión inteligente de equipos universitarios</p>
    </div>

    <!-- Google Sign-In -->
    <button class="btn-google" id="btn-google" onclick="handleGoogleSignIn()">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335"
          d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
        <path fill="#4285F4"
          d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
        <path fill="#FBBC05"
          d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
        <path fill="#34A853"
          d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
      </svg>
      Continuar con Google
    </button>

    <div class="auth-divider" style="margin:20px 0">o usa tu correo</div>

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Iniciar Sesión</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Crear Cuenta</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="form-group">
        <label class="form-label required">Correo electrónico</label>
        <div class="input-group">
          <span class="input-icon">✉️</span>
          <input type="email" id="login-email" class="form-input" placeholder="tu@correo.com" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Contraseña</label>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="login-pw" class="form-input" placeholder="••••••••"
            autocomplete="current-password">
          <button class="pw-toggle" onclick="togglePw('login-pw',this)" tabindex="-1">👁️</button>
        </div>
        <span class="forgot-link" onclick="handleForgot()">¿Olvidaste tu contraseña?</span>
      </div>
      <button class="btn btn-primary btn-xl btn-full" id="btn-login" onclick="handleLogin()">
        Iniciar Sesión
      </button>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="panel-register">
      <div class="form-group">
        <label class="form-label required">Nombre completo</label>
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="reg-name" class="form-input" placeholder="Juan Pérez" autocomplete="name">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Correo electrónico</label>
        <div class="input-group">
          <span class="input-icon">✉️</span>
          <input type="email" id="reg-email" class="form-input" placeholder="tu@correo.com" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Contraseña</label>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="reg-pw" class="form-input" placeholder="Mínimo 6 caracteres"
            autocomplete="new-password">
          <button class="pw-toggle" onclick="togglePw('reg-pw',this)" tabindex="-1">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Confirmar contraseña</label>
        <div class="input-group">
          <span class="input-icon">🔐</span>
          <input type="password" id="reg-pw2" class="form-input" placeholder="Repite la contraseña"
            autocomplete="new-password">
        </div>
      </div>
      <button class="btn btn-primary btn-xl btn-full" id="btn-register" onclick="handleRegister()">
        Crear Cuenta
      </button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/index.js"></script>
</body>

</html>
