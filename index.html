<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="SysInventarios — Sistema de gestión de inventarios de equipos electrónicos universitarios con análisis por IA.">
  <title>SysInventarios — Acceso</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/index.css">
</head>

<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-card fade-in">
    <div class="auth-logo">
      <div class="auth-logo-icon">🖥️</div>
      <h1 class="gradient-text">SysInventarios</h1>
      <p>Gestión inteligente de equipos universitarios</p>
    </div>

    <!-- Google Sign-In -->
    <button class="btn-google" id="btn-google" onclick="handleGoogleSignIn()">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335"
          d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
        <path fill="#4285F4"
          d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
        <path fill="#FBBC05"
          d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
        <path fill="#34A853"
          d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
      </svg>
      Continuar con Google
    </button>

    <div class="auth-divider" style="margin:20px 0">o usa tu correo</div>

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Iniciar Sesión</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Crear Cuenta</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="form-group">
        <label class="form-label required">Correo electrónico</label>
        <div class="input-group">
          <span class="input-icon">✉️</span>
          <input type="email" id="login-email" class="form-input" placeholder="tu@correo.com" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Contraseña</label>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="login-pw" class="form-input" placeholder="••••••••"
            autocomplete="current-password">
          <button class="pw-toggle" onclick="togglePw('login-pw',this)" tabindex="-1">👁️</button>
        </div>
        <span class="forgot-link" onclick="handleForgot()">¿Olvidaste tu contraseña?</span>
      </div>
      <button class="btn btn-primary btn-xl btn-full" id="btn-login" onclick="handleLogin()">
        Iniciar Sesión
      </button>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="panel-register">
      <div class="form-group">
        <label class="form-label required">Nombre completo</label>
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="reg-name" class="form-input" placeholder="Juan Pérez" autocomplete="name">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Correo electrónico</label>
        <div class="input-group">
          <span class="input-icon">✉️</span>
          <input type="email" id="reg-email" class="form-input" placeholder="tu@correo.com" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Contraseña</label>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="reg-pw" class="form-input" placeholder="Mínimo 6 caracteres"
            autocomplete="new-password">
          <button class="pw-toggle" onclick="togglePw('reg-pw',this)" tabindex="-1">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label required">Confirmar contraseña</label>
        <div class="input-group">
          <span class="input-icon">🔐</span>
          <input type="password" id="reg-pw2" class="form-input" placeholder="Repite la contraseña"
            autocomplete="new-password">
        </div>
      </div>
      <button class="btn btn-primary btn-xl btn-full" id="btn-register" onclick="handleRegister()">
        Crear Cuenta
      </button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/ui.js"></script>
  <script>
    // Redirect if already logged in
    redirectIfLoggedIn('app.html');

    // GOOGLE SIGN-IN
    async function handleGoogleSignIn() {
      const btn = document.getElementById('btn-google');
      btn.disabled = true;
      btn.style.opacity = '0.7';
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
        window.location.href = 'app.html';
      } catch (err) {
        const msgs = {
          'auth/popup-closed-by-user': 'Ventana de Google cerrada. Intenta de nuevo.',
          'auth/popup-blocked': 'El navegador bloqueó el popup. Permite ventanas emergentes.',
          'auth/account-exists-with-different-credential': 'Ya existe una cuenta con ese correo.',
        };
        showToast(msgs[err.code] || err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.style.opacity = '1';
      }
    }

    // TAB SWITCH
    function switchTab(tab) {
      document.getElementById('panel-login').classList.toggle('active', tab === 'login');
      document.getElementById('panel-register').classList.toggle('active', tab === 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    // TOGGLE PASSWORD
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.textContent = isText ? '👁️' : '🙈';
    }

    // LOGIN
    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pw = document.getElementById('login-pw').value;
      if (!email || !pw) { showToast('Completa todos los campos.', 'warning'); return; }

      const btn = document.getElementById('btn-login');
      btn.classList.add('loading'); btn.disabled = true;
      try {
        await auth.signInWithEmailAndPassword(email, pw);
        window.location.href = 'app.html';
      } catch (err) {
        const msgs = {
          'auth/user-not-found': 'No existe cuenta con ese correo.',
          'auth/wrong-password': 'Contraseña incorrecta.',
          'auth/invalid-email': 'Correo inválido.',
          'auth/too-many-requests': 'Demasiados intentos. Intenta más tarde.',
        };
        showToast(msgs[err.code] || err.message, 'error');
      } finally {
        btn.classList.remove('loading'); btn.disabled = false;
      }
    }

    // REGISTER
    async function handleRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pw = document.getElementById('reg-pw').value;
      const pw2 = document.getElementById('reg-pw2').value;

      if (!name || !email || !pw || !pw2) { showToast('Completa todos los campos.', 'warning'); return; }
      if (pw !== pw2) { showToast('Las contraseñas no coinciden.', 'warning'); return; }
      if (pw.length < 6) { showToast('La contraseña debe tener al menos 6 caracteres.', 'warning'); return; }

      const btn = document.getElementById('btn-register');
      btn.classList.add('loading'); btn.disabled = true;
      try {
        const { user } = await auth.createUserWithEmailAndPassword(email, pw);
        await user.updateProfile({ displayName: name });
        window.location.href = 'app.html';
      } catch (err) {
        const msgs = {
          'auth/email-already-in-use': 'Ya existe una cuenta con ese correo.',
          'auth/invalid-email': 'Correo inválido.',
          'auth/weak-password': 'Contraseña demasiado débil.',
        };
        showToast(msgs[err.code] || err.message, 'error');
      } finally {
        btn.classList.remove('loading'); btn.disabled = false;
      }
    }

    // FORGOT PASSWORD
    async function handleForgot() {
      const email = document.getElementById('login-email').value.trim();
      if (!email) { showToast('Escribe tu correo arriba primero.', 'warning'); return; }
      try {
        await auth.sendPasswordResetEmail(email);
        showToast('Email de recuperación enviado. Revisa tu bandeja.', 'success');
      } catch (err) {
        showToast('No se pudo enviar el email.', 'error');
      }
    }

    // ENTER KEY EVENT
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const loginPanel = document.getElementById('panel-login');
      if (loginPanel.classList.contains('active')) handleLogin();
      else handleRegister();
    });
  </script>
</body>

</html>
